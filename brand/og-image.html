<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'MyriadPro';
    src: url('myriadpro-boldsemiext-webfont.woff2') format('woff2'),
         url('myriadpro-boldsemiext-webfont.woff') format('woff');
    font-weight: bold;
    font-style: normal;
  }
  html, body {
    margin: 0;
    padding: 0;
    background-color: #5B21B6;
  }
  .card {
    width: 1200px;
    height: 630px;
    background-color: #5B21B6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .logo {
    font-family: 'MyriadPro', sans-serif;
    font-size: 260px;
    font-weight: bold;
    letter-spacing: -1px;
    color: #FFFFFF;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">SaturnCI</div>
  </div>
</body>
</html>
