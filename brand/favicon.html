<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'MyriadPro';
    src: url('myriadpro-boldsemiext-webfont.woff2') format('woff2'),
         url('myriadpro-boldsemiext-webfont.woff') format('woff');
    font-weight: bold;
    font-style: normal;
  }
  body {
    margin: 0;
    padding: 0;
    background: transparent;
  }
  .icon {
    width: 256px;
    height: 256px;
    background-color: #5B21B6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .letter {
    font-family: 'MyriadPro', sans-serif;
    font-size: 180px;
    font-weight: bold;
    color: #FFFFFF;
    margin-top: -10px;
  }
</style>
</head>
<body>
  <div class="icon">
    <div class="letter">S</div>
  </div>
</body>
</html>
